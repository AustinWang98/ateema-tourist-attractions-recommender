services:
  - type: web
    name: ateema-tourist-attractions-recommender
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LOG_LEVEL
        value: INFO
      - key: OPENAI_BASE_URL
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LLM_CACHE_ENABLED
        value: "0"
      - key: FEEDBACK_GUARD_ENABLED
        value: "true"
